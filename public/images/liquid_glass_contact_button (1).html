
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, .stage {
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }

  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 260px; height: 260px; background: radial-gradient(circle, rgba(120,180,255,0.45) 0%, transparent 70%); top: -60px; left: -80px; }
  .orb2 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(190,130,255,0.4) 0%, transparent 70%); bottom: -40px; right: -60px; }
  .orb3 { width: 180px; height: 180px; background: radial-gradient(circle, rgba(100,230,200,0.3) 0%, transparent 70%); bottom: 0px; left: -40px; }

  .btn-wrap {
    position: relative;
    z-index: 1;
  }

  .liquid-btn {
    position: relative;
    padding: 18px 52px;
    border: none;
    cursor: pointer;
    border-radius: 999px;
    outline: none;
    background: transparent;
    transform: translateZ(0);
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), filter 0.18s ease;
    filter: drop-shadow(0 8px 32px rgba(100,160,255,0.28)) drop-shadow(0 2px 8px rgba(0,0,0,0.18));
  }

  .liquid-btn:hover {
    transform: translateY(-3px) scale(1.035) translateZ(0);
    filter: drop-shadow(0 14px 40px rgba(100,160,255,0.38)) drop-shadow(0 4px 12px rgba(0,0,0,0.22));
  }

  .liquid-btn:active {
    transform: translateY(1px) scale(0.97) translateZ(0);
    filter: drop-shadow(0 4px 16px rgba(100,160,255,0.22)) drop-shadow(0 2px 6px rgba(0,0,0,0.16));
    transition: transform 0.08s ease, filter 0.08s ease;
  }

  .glass-body {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    overflow: hidden;
  }

  .glass-fill {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.38) 0%,
      rgba(255,255,255,0.12) 35%,
      rgba(180,210,255,0.18) 60%,
      rgba(210,180,255,0.22) 100%
    );
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
  }

  .glass-border {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.75),
      inset 0 -1px 0 rgba(255,255,255,0.15),
      inset 1px 0 0 rgba(255,255,255,0.35),
      inset -1px 0 0 rgba(255,255,255,0.1);
  }

  .glass-specular {
    position: absolute;
    top: 3px; left: 14px; right: 14px;
    height: 42%;
    border-radius: 999px;
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.72) 0%,
      rgba(255,255,255,0.18) 60%,
      transparent 100%
    );
    pointer-events: none;
  }

  .glass-shine-bottom {
    position: absolute;
    bottom: 3px; left: 20px; right: 20px;
    height: 28%;
    border-radius: 999px;
    background: linear-gradient(
      0deg,
      rgba(255,255,255,0.28) 0%,
      transparent 100%
    );
    pointer-events: none;
  }

  .glass-depth {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: radial-gradient(
      ellipse 70% 60% at 50% 120%,
      rgba(120,160,255,0.22) 0%,
      transparent 70%
    );
    pointer-events: none;
  }

  .btn-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 11px;
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.96);
    text-shadow: 0 1px 4px rgba(0,0,0,0.22), 0 0 20px rgba(200,220,255,0.5);
    user-select: none;
    white-space: nowrap;
  }

  .btn-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px rgba(200,230,255,0.6));
  }

  .ripple-ring {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,0);
    animation: ring-pulse 3s ease-in-out infinite;
  }
  .ripple-ring:nth-child(2) { animation-delay: 1s; }
  .ripple-ring:nth-child(3) { animation-delay: 2s; }

  @keyframes ring-pulse {
    0% { transform: scale(1); border-color: rgba(255,255,255,0); }
    40% { border-color: rgba(180,210,255,0.35); }
    100% { transform: scale(1.22); border-color: rgba(255,255,255,0); }
  }

  .liquid-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.18) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 3;
  }
  .liquid-btn:hover::after { opacity: 1; }

  .label-text {
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(180,200,230,0.7);
    font-weight: 500;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
</style>

<div class="stage">
  <div class="scene">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <div class="btn-wrap">
      <div class="ripple-ring"></div>
      <div class="ripple-ring"></div>
      <div class="ripple-ring"></div>
      <button class="liquid-btn" id="glassBtn" aria-label="Contact us">
        <div class="glass-body">
          <div class="glass-fill"></div>
          <div class="glass-border"></div>
          <div class="glass-specular"></div>
          <div class="glass-shine-bottom"></div>
          <div class="glass-depth"></div>
        </div>
        <span class="btn-content">
          Contact Us
        </span>
      </button>
    </div>
  </div>
</div>

<script>
  const btn = document.getElementById('glassBtn');

  btn.addEventListener('mousemove', (e) => {
    const rect = btn.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    btn.style.setProperty('--mx', x + '%');
    btn.style.setProperty('--my', y + '%');
  });

  btn.addEventListener('click', () => {
    btn.style.transition = 'transform 0.06s ease, filter 0.06s ease';
    const specular = btn.querySelector('.glass-specular');
    specular.style.transition = 'opacity 0.15s';
    specular.style.opacity = '0.4';
    setTimeout(() => { specular.style.opacity = '1'; }, 200);
  });
</script>
